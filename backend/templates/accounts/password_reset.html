{% extends 'base.html' %}

{% block title %}Reset Password - Ticket2X{% endblock %}

{% block content %}
  <div style="max-width: 460px; margin: 5rem auto; padding: 2.5rem; 
              background: rgba(30, 30, 40, 0.95); border-radius: 16px; 
              box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 25px rgba(255,82,82,0.6); 
              border: 2px solid #ff5252; color: #eee;">

    <h2 style="text-align: center; margin-bottom: 2rem; color: #ff5252;">
      Reset Your Password
    </h2>

    <p style="text-align: center; color: #ccc; margin-bottom: 2rem;">
      Enter your email address and we'll send you a link to reset your password.
    </p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" style="width: 100%; padding: 14px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer;">
        Send Reset Link
      </button>
    </form>

    <p style="text-align: center; margin-top: 2rem; color: #aaa;">
      <a href="{% url 'accounts:login' %}" style="color: #ff9999;">Back to Login</a>
    </p>
  </div>
{% endblock %}
