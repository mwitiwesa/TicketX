{% extends 'base.html' %}

{% block title %}Login - Ticket2X{% endblock %}

{% block content %}
  <div style="max-width: 480px; margin: 5rem auto; padding: 3rem 2.5rem; 
              background: rgba(30, 30, 40, 0.95); 
              border-radius: 18px; 
              box-shadow: 0 12px 50px rgba(0,0,0,0.7),
                          0 0 35px rgba(255, 82, 82, 0.8); 
              border: 3px solid #ff5252;
              color: #eee;">

    <h2 style="text-align: center; margin-bottom: 2.2rem; color: #ff5252; font-size: 2rem;">
      Login to Ticket2X
    </h2>

    {% if form.errors %}
      <p style="color: #ff6666; text-align: center; margin-bottom: 1.5rem; font-size: 1.05rem;">
        Invalid email or password. Please try again.
      </p>
    {% endif %}

    <form method="post" action="{% url 'accounts:login' %}">
      {% csrf_token %}

      <!-- Large Email Field -->
      <div style="margin-bottom: 2.2rem;">
        <label style="display: block; margin-bottom: 0.8rem; color: #d8d7d7; font-size: 1.25rem;">Email Address</label>
        <input type="email" name="username" id="id_username" required autofocus
               style="width: 100%; padding: 18px 16px; font-size: 1.25rem;
                      background: #1e1e2e; color: white; border: 1px solid #555; border-radius: 8px;">
      </div>

      <!-- Large Password Field with Eye Icon -->
      <div style="margin-bottom: 2.5rem; position: relative;">
        <label style="display: block; margin-bottom: 0.8rem; color: #ccc; font-size: 1.25rem;">Password</label>
        <div style="position: relative;">
          <input type="password" name="password" id="id_password" required
                 style="width: 100%; padding: 18px 16px; font-size: 1.25rem;
                        background: #1e1e2e; color: white; border: 1px solid #555; border-radius: 8px;">
          <span onclick="togglePassword()" 
                style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); 
                       cursor: pointer; color: #aaa; font-size: 1.9rem; z-index: 10;">
            👁️
          </span>
        </div>
      </div>

      <button type="submit" 
              style="width: 100%; padding: 20px; background: #d32f2f; color: white; 
                     border: none; border-radius: 10px; font-size: 1.35rem; font-weight: bold; cursor: pointer;">
        Login
      </button>
    </form>

    <!-- Forgot Password Link -->
    <div style="text-align: center; margin-top: 1.8rem;">
      <a href="{% url 'accounts:password_reset' %}" 
         style="color: #ff9999; text-decoration: none; font-size: 1.1rem;">
        Forgot your password?
      </a>
    </div>

    <p style="text-align: center; margin-top: 2.2rem; color: #aaa; font-size: 1.1rem;">
      Don't have an account? 
      <a href="{% url 'accounts:register' %}" style="color: #ff9999;">Register here</a>
    </p>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('id_password');
      if (pwd.type === "password") {
        pwd.type = "text";
      } else {
        pwd.type = "password";
      }
    }
  </script>
{% endblock %}
