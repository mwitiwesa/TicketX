{% extends 'base.html' %}

{% block title %}Login - Ticket2X{% endblock %}

{% block content %}
  <div style="max-width: 460px; margin: 5rem auto; padding: 2.5rem; 
              background: rgba(30, 30, 40, 0.95); border-radius: 16px; 
              box-shadow: 0 10px 40px rgba(0,0,0,0.6); color: #eee;">

    <h2 style="text-align: center; margin-bottom: 2rem; color: #ff5252;">
      Login to Ticket2X
    </h2>

    {% if form.errors %}
      <p style="color: #ff6666; text-align: center; margin-bottom: 1.5rem; font-size: 1.05rem;">
        Invalid email or password. Please try again.
      </p>
    {% endif %}

    <form method="post" action="{% url 'accounts:login' %}">
      {% csrf_token %}

      <!-- Email Field - Bigger -->
      <div style="margin-bottom: 1.8rem;">
        <label style="display: block; margin-bottom: 0.6rem; color: #ccc; font-size: 1.1rem;">Email Address</label>
        {{ form.username }}
      </div>

      <!-- Password Field - Bigger with Eye Icon Inside -->
      <div style="margin-bottom: 2.2rem; position: relative;">
        <label style="display: block; margin-bottom: 0.6rem; color: #ccc; font-size: 1.1rem;">Password</label>
        <input type="password" name="password" id="id_password" required
               style="width: 100%; padding: 16px 50px 16px 16px; font-size: 1.15rem; 
                      border-radius: 10px; border: 1px solid #444; background: #222; color: #eee;">
        <span onclick="togglePassword()" 
              style="position: absolute; right: 18px; top: 48px; cursor: pointer; color: #aaa; font-size: 1.4rem;">
          👁️
        </span>
      </div>

      <button type="submit" 
              style="width: 100%; padding: 16px; background: #d32f2f; color: white; 
                     border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">
        Login
      </button>
    </form>

    <p style="text-align: center; margin-top: 2rem; color: #aaa; font-size: 1.05rem;">
      Don't have an account? 
      <a href="{% url 'accounts:register' %}" style="color: #ff9999;">Register here</a>
    </p>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('id_password');
      if (pwd.type === "password") {
        pwd.type = "text";
      } else {
        pwd.type = "password";
      }
    }
  </script>
{% endblock %}
