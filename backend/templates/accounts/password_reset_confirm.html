{% extends 'base.html' %}

{% block title %}Set New Password - Ticket2X{% endblock %}

{% block content %}
  <div style="max-width: 460px; margin: 5rem auto; padding: 2.5rem; background: rgba(30, 30, 40, 0.95); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); color: #eee;">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #ff5252;">Set New Password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" style="width: 100%; padding: 14px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-size: 1.1rem;">
        Change Password
      </button>
    </form>
  </div>
{% endblock %}
