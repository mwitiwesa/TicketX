<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ticket2X{% endblock %}</title>
    <style>
        :root {
            --primary-red: #ff5252;
            --dark-bg: #0f0f1a;
        }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--dark-bg); color: #eee; }
        .navbar {
            background: #111; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .logo { color: var(--primary-red); font-size: 1.8rem; font-weight: bold; }
        .nav-links a { color: #ccc; margin-left: 1.5rem; text-decoration: none; }
        .nav-links a:hover { color: white; }
        .hamburger { font-size: 1.8rem; cursor: pointer; display: none; color: white; }

        /* Side Menu */
        .side-menu {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100%; background: #1a1a2e; 
            transition: right 0.4s ease; padding: 2rem; box-shadow: -5px 0 15px rgba(0,0,0,0.5); z-index: 200;
        }
        .side-menu.open { right: 0; }
        .side-menu a { display: block; padding: 1rem; color: #ddd; text-decoration: none; border-bottom: 1px solid #333; }
        .side-menu a:hover { background: #2a2a40; color: white; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Ticket2X</div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="/">Home</a>
                <a href="{% url 'accounts:logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'accounts:login' %}">Login</a>
                <a href="{% url 'accounts:register' %}">Register</a>
            {% endif %}
        </div>
        <div class="hamburger" id="menu-toggle">☰</div>
    </nav>

    <!-- Side Menu -->
    <div class="side-menu" id="side-menu">
        <h2 style="color: #ff5252;">Menu</h2>
        {% if user.is_authenticated %}
            <a href="/">Home</a>
            <a href="/bookings/my-tickets/">Your Tickets</a>
            <a href="{% url 'accounts:logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'accounts:login' %}">Login</a>
            <a href="{% url 'accounts:register' %}">Register</a>
        {% endif %}
    </div>

    <div style="padding: 2rem;">
        {% block content %}{% endblock %}
    </div>

    <script>
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('side-menu');
        toggle.addEventListener('click', () => {
            menu.classList.toggle('open');
        });
        // Close when clicking outside
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && e.target !== toggle) {
                menu.classList.remove('open');
            }
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
